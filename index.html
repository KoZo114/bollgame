<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ブロック崩し - トランポリンモード</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            transition: background-color 0.1s;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            pointer-events: none;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            transition: opacity 0.5s;
        }

        #startScreen h1 {
            font-size: 36px;
            margin-bottom: 30px;
            color: #00FFDD;
            text-align: center;
        }

        #startButton {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #FF3366;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 51, 102, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h2 { margin: 0; font-size: 24px; }
        #stageInfo { font-size: 20px; color: #00FFDD; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>

<body>
    <div id="startScreen">
        <h1>NEON BREAKOUT</h1>
        <p style="margin-bottom: 40px; text-align: center; color: #ccc;">画面をなぞってボールを跳ね返そう！</p>
        <button id="startButton">TAP TO START</button>
    </div>

    <div id="ui" style="display: none;">
        <div id="stageInfo">STAGE 1 <span id="livesContainer"
                style="color: #FF3366; margin-left:15px; font-size: 18px;">♥♥♥</span></div>
        <h2>Score: <span id="scoreText">0</span></h2>
    </div>
    <canvas id="gameCanvas" style="display: none;"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("scoreText");
        const stageInfo = document.getElementById("stageInfo");
        const uiDiv = document.getElementById("ui");
        const startScreen = document.getElementById("startScreen");
        const startButton = document.getElementById("startButton");

        let gameStarted = false;
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        let isGameOver = false;
        let isGameCleared = false; // ★全クリ状態の管理
        let score = 0;
        let currentStage = 1;
        const maxStage = 3;
        const initialLives = 3; 
        let lives = initialLives; 
        let canReplay = true; 
        let particles = []; // ★花火用の火花

        function updateLivesUI() {
            let hearts = "";
            for (let i = 0; i < lives; i++) hearts += "♥";
            const container = document.getElementById("livesContainer");
            if(container) container.innerText = hearts;
        }

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            startBGM();
        }

        startButton.addEventListener("click", () => {
            initAudio();
            startScreen.style.opacity = "0";
            setTimeout(() => {
                startScreen.style.display = "none";
                uiDiv.style.display = "block";
                canvas.style.display = "block";
                resize();
                gameStarted = true;
                loadStage(1);
                update();
            }, 500);
        });

        function playSE(freq, type = 'sine', duration = 0.1, vol = 0.1, slideFreq = null) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            osc.frequency.setValueAtTime(freq, now);
            if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, now + duration);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(vol, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.start(now);
            osc.stop(now + duration);
        }

        let bgmStep = 0, lastBgmTime = 0;
        const bgmNotes = [130.81, 164.81, 196.00, 261.63, 123.47, 146.83, 196.00, 246.94];
        function updateBGM() {
            if (isGameOver || isGameCleared || !audioCtx) return;
            const now = Date.now();
            if (now - lastBgmTime > 200) {
                playSE(bgmNotes[bgmStep % bgmNotes.length], 'square', 0.15, 0.005);
                bgmStep++;
                lastBgmTime = now;
            }
        }
        function startBGM() { lastBgmTime = Date.now(); }

        const ball = { x: 0, y: 0, radius: 8, dx: 0, dy: 0, baseSpeed: 7, color: "#FF3366" };
        let bricks = [];
        let brickColumnCount = 0, brickRowCount = 0;
        const brickPadding = 8, brickOffsetTop = 120, brickWidth = 52, brickHeight = 20;
        let maxLineLength = 100;

        // ★花火（火花）を生成する関数
        function createFireworks() {
            for (let j = 0; j < 5; j++) { // 5連発
                setTimeout(() => {
                    const centerX = Math.random() * canvas.width;
                    const centerY = Math.random() * (canvas.height / 2);
                    for (let i = 0; i < 50; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 6 + 2;
                        particles.push({
                            x: centerX, y: centerY,
                            dx: Math.cos(angle) * speed, dy: Math.sin(angle) * speed,
                            size: Math.random() * 3 + 2,
                            color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                            life: 1.0
                        });
                    }
                }, j * 400);
            }
        }

        function loadStage(stage) {
            currentStage = stage;
            updateLivesUI();
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 3;
            ball.dy = -4;
            ball.radius = 8;
            brickColumnCount = Math.floor(canvas.width / (brickWidth + brickPadding));
            const brickOffsetLeft = (canvas.width - (brickColumnCount * (brickWidth + brickPadding)) + brickPadding) / 2;
            
            if (stage === 1) { ball.baseSpeed = 6; brickRowCount = 4; maxLineLength = 200; createBricksRandom(brickColumnCount, brickRowCount, brickOffsetLeft, 1.0); }
            else if (stage === 2) { ball.baseSpeed = 8; brickRowCount = 6; maxLineLength = 150; createBricksRandom(brickColumnCount, brickRowCount, brickOffsetLeft, 0.7); }
            else if (stage === 3) { ball.baseSpeed = 10; brickRowCount = 8; maxLineLength = 110; createBricksPyramid(brickColumnCount, brickRowCount, brickOffsetLeft); }
        }

        function createBricksRandom(cols, rows, offsetL, chance) {
            bricks = [];
            for (let c = 0; c < cols; c++) {
                bricks[c] = [];
                for (let r = 0; r < rows; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: Math.random() < chance ? 1 : 0, baseColorY: r, offsetL: offsetL };
                }
            }
        }

        function createBricksPyramid(cols, rows, offsetL) {
            bricks = [];
            const indestructiblePositions = [{ c: Math.floor(cols / 4), r: Math.floor(rows / 2) }, { c: Math.floor(cols * 3 / 4), r: Math.floor(rows / 2) }];
            for (let c = 0; c < cols; c++) {
                bricks[c] = [];
                for (let r = 0; r < rows; r++) {
                    const distFromCenter = Math.abs(c - cols / 2);
                    let status = (rows - r > distFromCenter) ? 1 : 0;
                    for (let pos of indestructiblePositions) { if (pos.c === c && pos.r === r) status = 2; }
                    bricks[c][r] = { x: 0, y: 0, status: status, baseColorY: r, offsetL: offsetL };
                }
            }
        }

        const trampolines = [];
        let drawingLine = null, lineDrawCount = 0, lastLineTime = 0;

        function getCoords(e) {
            if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }

        function startDraw(e) {
            e.preventDefault();
            if (trampolines.length > 0 || drawingLine !== null || Date.now() - lastLineTime < 200) return;
            const pos = getCoords(e);
            lineDrawCount++;
            let trickType = (lineDrawCount % 10 === 0) ? 1 : (currentStage === 3 && lineDrawCount % 5 === 0) ? 2 : 0;
            drawingLine = { start: pos, current: pos, trickType: trickType };
        }

        function moveDraw(e) {
            e.preventDefault();
            if (drawingLine) {
                const pos = getCoords(e);
                const dx = pos.x - drawingLine.start.x, dy = pos.y - drawingLine.start.y, dist = Math.hypot(dx, dy);
                if (dist > maxLineLength) {
                    const ratio = maxLineLength / dist;
                    drawingLine.current = { x: drawingLine.start.x + dx * ratio, y: drawingLine.start.y + dy * ratio };
                } else drawingLine.current = pos;
            }
        }

        function endDraw(e) {
            e.preventDefault();
            if (drawingLine) {
                if (Math.hypot(drawingLine.current.x - drawingLine.start.x, drawingLine.current.y - drawingLine.start.y) > 10) {
                    trampolines.push({ start: drawingLine.start, end: drawingLine.current, life: 100, trickType: drawingLine.trickType });
                } else lastLineTime = Date.now();
                drawingLine = null;
            }
        }

        canvas.addEventListener("mousedown", startDraw);
        canvas.addEventListener("mousemove", moveDraw);
        canvas.addEventListener("mouseup", endDraw);
        canvas.addEventListener("touchstart", startDraw, { passive: false });
        canvas.addEventListener("touchmove", moveDraw, { passive: false });
        canvas.addEventListener("touchend", endDraw);

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status > 0) {
                        if (ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + brickWidth && ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + brickHeight) {
                            ball.dy = -ball.dy;
                            if (b.status === 2) playSE(200, 'square', 0.05, 0.05);
                            else {
                                b.status = 0; score += 10; scoreText.innerText = score; playSE(880, 'square', 0.1, 0.05);
                                if (isStageClear()) {
                                    if (currentStage < maxStage) {
                                        playSE(523.25, 'triangle', 0.2, 0.1, 1046.5); isGameOver = true;
                                        setTimeout(() => { isGameOver = false; lastBgmTime = Date.now(); loadStage(currentStage + 1); update(); }, 1500);
                                    } else {
                                        // ★全クリアのときだけ花火を上げる！
                                        isGameCleared = true; 
                                        playSE(1046.5, 'triangle', 0.5, 0.1, 2093);
                                        createFireworks();
                                        setTimeout(() => { alert("CONGRATULATIONS! 全ステージクリア！おめでとう！"); document.location.reload(); }, 3500);
                                    }
                                }
                            }
                        }
                    }
                }
            }

            for (let i = trampolines.length - 1; i >= 0; i--) {
                const t = trampolines[i], res = getDistanceToSegment(ball, t.start, t.end);
                if (res.dist < ball.radius) {
                    const dx = t.end.x - t.start.x, dy = t.end.y - t.start.y, len = Math.hypot(dx, dy);
                    if (len > 0) {
                        let nx = -dy / len, ny = dx / len, dotBall = ball.dx * nx + ball.dy * ny;
                        if (dotBall > 0) { nx = -nx; ny = -ny; dotBall = -dotBall; }
                        ball.dx = ball.dx - 2 * dotBall * nx; ball.dy = ball.dy - 2 * dotBall * ny;
                        if (t.trickType === 1) { // 加速
                            const boost = (ball.baseSpeed * 1.6) / (Math.hypot(ball.dx, ball.dy) || 1);
                            ball.dx *= boost; ball.dy *= boost;
                            canvas.style.backgroundColor = "rgba(255,215,0,0.3)"; playSE(1200, 'sawtooth', 0.3, 0.05, 2400);
                        } else {
                            if (t.trickType === 2) { ball.radius = 4; canvas.style.backgroundColor = "rgba(200,0,255,0.2)"; playSE(2000, 'sine', 0.2, 0.05, 4000); }
                            else { ball.radius = 8; canvas.style.backgroundColor = "#2a2a2a"; playSE(440, 'sine', 0.1, 0.1); }
                            const norm = ball.baseSpeed / (Math.hypot(ball.dx, ball.dy) || 1);
                            ball.dx *= norm; ball.dy *= norm;
                        }
                        setTimeout(() => { canvas.style.backgroundColor = "#1a1a1a"; }, 50); t.life = 0;
                    }
                }
            }
        }

        function getDistanceToSegment(p, a, b) {
            const l2 = (b.x - a.x) ** 2 + (b.y - a.y) ** 2;
            if (l2 == 0) return { dist: Math.hypot(p.x - a.x, p.y - a.y) };
            let t = Math.max(0, Math.min(1, ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2));
            return { dist: Math.hypot(p.x - (a.x + t * (b.x - a.x)), p.y - (a.y + t * (b.y - a.y))) };
        }

        function isStageClear() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) { if (bricks[c][r].status === 1) return false; }
            }
            return true;
        }

        function update() {
            if (isGameOver && !isGameCleared) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 花火更新
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.dx; p.y += p.dy; p.dy += 0.1; p.life -= 0.015;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            if (isGameCleared) { requestAnimationFrame(update); return; }

            // 描画：ブロック、線、ボール
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status > 0) {
                        b.x = (c * (brickWidth + brickPadding)) + b.offsetL; b.y = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        ctx.beginPath(); ctx.roundRect(b.x, b.y, brickWidth, brickHeight, 4);
                        ctx.fillStyle = b.status === 2 ? "#888888" : `hsl(${b.baseColorY * 40 + 160}, 80%, 65%)`; ctx.fill();
                    }
                }
            }
            ctx.lineCap = "round"; ctx.lineWidth = 6;
            if (drawingLine) {
                ctx.beginPath(); ctx.moveTo(drawingLine.start.x, drawingLine.start.y); ctx.lineTo(drawingLine.current.x, drawingLine.current.y);
                ctx.strokeStyle = drawingLine.trickType === 1 ? "rgba(255,215,0,0.8)" : drawingLine.trickType === 2 ? "rgba(200,0,255,0.8)" : "rgba(0,255,221,0.5)"; ctx.stroke();
            }
            for (let t of trampolines) {
                ctx.beginPath(); ctx.moveTo(t.start.x, t.start.y); ctx.lineTo(t.end.x, t.end.y);
                ctx.strokeStyle = t.trickType === 1 ? `rgba(255,215,0,${t.life/100})` : t.trickType === 2 ? `rgba(200,0,255,${t.life/100})` : `rgba(0,255,221,${t.life/100})`; ctx.stroke();
            }
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fillStyle = ball.color; ctx.fill();

            collisionDetection();
            updateBGM();

            // 壁・天井反射 & 落下
            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) ball.dx = -ball.dx;
            if (ball.y + ball.dy < ball.radius) ball.dy = -ball.dy;
            else if (ball.y + ball.dy > canvas.height - ball.radius) {
                lives--; updateLivesUI(); playSE(100, 'sawtooth', 0.5, 0.1, 50);
                if (lives > 0) {
                    ball.x = canvas.width / 2; ball.y = canvas.height / 2; ball.dx = (Math.random() > 0.5 ? 1 : -1) * 3; ball.dy = -4;
                    trampolines.length = 0; drawingLine = null;
                } else {
                    isGameOver = true;
                    setTimeout(() => {
                        if (canReplay && confirm("復活しますか？(スコアは0になります)")) {
                            lives = initialLives; score = 0; scoreText.innerText = score; canReplay = false; isGameOver = false; updateLivesUI();
                            ball.x = canvas.width / 2; ball.y = canvas.height / 2; ball.dx = 3; ball.dy = -4; update();
                        } else document.location.reload();
                    }, 500);
                }
            }

            // ★重要：速度の自動補正（尋常じゃない速さになるのを防ぐ）
            let curSpd = Math.hypot(ball.dx, ball.dy);
            let targetSpd = (curSpd > ball.baseSpeed * 1.2) ? ball.baseSpeed * 1.6 : ball.baseSpeed;
            let normalization = targetSpd / (curSpd || 1);
            ball.dx *= normalization; ball.dy *= normalization;

            ball.x += ball.dx; ball.y += ball.dy;
            for (let i = trampolines.length - 1; i >= 0; i--) {
                trampolines[i].life -= 2;
                if (trampolines[i].life <= 0) { trampolines.splice(i, 1); lastLineTime = Date.now(); }
            }
            requestAnimationFrame(update);
        }
    </script>
</body>

</html>
