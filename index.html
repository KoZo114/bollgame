<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ブロック崩し - トランポリンモード</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            transition: background-color 0.1s;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            pointer-events: none;
        }

        h2 {
            margin: 0;
            font-size: 24px;
        }

        #stageInfo {
            font-size: 20px;
            color: #00FFDD;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="ui">
        <div id="stageInfo">STAGE 1 <span id="livesContainer"
                style="color: #FF3366; margin-left:15px; font-size: 18px;">♥♥</span></div>
        <h2>Score: <span id="scoreText">0</span></h2>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("scoreText");
        const stageInfo = document.getElementById("stageInfo");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        let isGameOver = false;
        let score = 0;
        let currentStage = 1;
        const maxStage = 3;
        let lives = 2; // ライフを追加
        const livesContainer = document.getElementById("livesContainer");

        // UIのライフ表示を更新する関数
        function updateLivesUI() {
            let hearts = "";
            for (let i = 0; i < lives; i++) hearts += "♥";
            livesContainer.innerText = hearts;
        }

        // --- オーディオ設定 (Web Audio API) ---
        let audioCtx;
        let isSoundEnabled = true; // デフォルトでON

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            startBGM(); // 初期化時にBGMスタート
        }

        // スマホやPCのブラウザで確実にAudioContextのロックを解除するためのグローバルリスナー
        function unlockAudio() {
            if (isSoundEnabled && !audioCtx) {
                initAudio();
            } else if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            // 一度解除したらリスナーを消す
            document.removeEventListener('touchstart', unlockAudio, true);
            document.removeEventListener('touchend', unlockAudio, true);
            document.removeEventListener('mousedown', unlockAudio, true);
            document.removeEventListener('click', unlockAudio, true);
        }

        // あらゆる画面タップ・クリックに反応させる
        document.addEventListener('touchstart', unlockAudio, true);
        document.addEventListener('touchend', unlockAudio, true);
        document.addEventListener('mousedown', unlockAudio, true);
        document.addEventListener('click', unlockAudio, true);

        // 効果音（SE）を鳴らす関数
        function playSE(freq, type = 'sine', duration = 0.1, vol = 0.1, slideFreq = null) {
            if (!isSoundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = type;
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            osc.frequency.setValueAtTime(freq, now);
            if (slideFreq) {
                // ピッチベンド（音がギュイーンと滑る）
                osc.frequency.exponentialRampToValueAtTime(slideFreq, now + duration);
            }

            // アタック＆リリース（プツッというノイズを防ぐ）
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(vol, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

            osc.start(now);
            osc.stop(now + duration);
        }

        // BGM（短いループ）のシーケンサー
        let bgmStep = 0;
        let lastBgmTime = 0;
        const bgmTempo = 200; // ms
        // ドミソド〜 シレソシ〜 というシンプルな8bit風ベースライン
        const bgmNotes = [
            130.81, 164.81, 196.00, 261.63, // C3, E3, G3, C4
            123.47, 146.83, 196.00, 246.94  // B2, D3, G3, B3
        ];

        function updateBGM() {
            if (!isSoundEnabled || isGameOver || !audioCtx) return;
            const now = Date.now();
            if (now - lastBgmTime > bgmTempo) {
                // ボリュームをさらに小さく（0.02 -> 0.005）して裏でポロポロ鳴らす
                playSE(bgmNotes[bgmStep % bgmNotes.length], 'square', 0.15, 0.005);
                bgmStep++;
                lastBgmTime = now;
            }
        }
        function startBGM() {
            lastBgmTime = Date.now();
        }

        // ボール（初期値は仮。ステージ開始時に上書き）
        const ball = { x: 0, y: 0, radius: 8, dx: 0, dy: 0, baseSpeed: 7, color: "#FF3366" };

        let bricks = [];
        let brickColumnCount = 0;
        let brickRowCount = 0;
        const brickPadding = 8;
        const brickOffsetTop = 120;
        const brickWidth = 52;
        const brickHeight = 20;

        // ステージ設定定義
        function loadStage(stage) {
            currentStage = stage;
            stageInfo.innerText = "STAGE " + stage;

            // ボールの初期位置と速度をリセット
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 3;
            ball.dy = -4;

            // 画面幅から列数を計算
            brickColumnCount = Math.floor(canvas.width / (brickWidth + brickPadding));
            const brickOffsetLeft = (canvas.width - (brickColumnCount * (brickWidth + brickPadding)) + brickPadding) / 2;

            if (stage === 1) {
                // ステージ1：練習（スキマなし、遅め）
                ball.baseSpeed = 6;
                brickRowCount = 4;
                createBricksRandom(brickColumnCount, brickRowCount, brickOffsetLeft, 1.0);
            }
            else if (stage === 2) {
                // ステージ2：スキマあり、少し速い
                ball.baseSpeed = 8;
                brickRowCount = 6;
                // 30%の確率でブロックがない隙間を作る
                createBricksRandom(brickColumnCount, brickRowCount, brickOffsetLeft, 0.7);
            }
            else if (stage === 3) {
                // ステージ3：高速＆階段状の配置
                ball.baseSpeed = 10;
                brickRowCount = 8;
                createBricksPyramid(brickColumnCount, brickRowCount, brickOffsetLeft);
            }
        }

        // ブロック生成 (確率 distribution で隙間を作る)
        function createBricksRandom(cols, rows, offsetL, chance) {
            bricks = [];
            for (let c = 0; c < cols; c++) {
                bricks[c] = [];
                for (let r = 0; r < rows; r++) {
                    const status = Math.random() < chance ? 1 : 0;
                    bricks[c][r] = { x: 0, y: 0, status: status, baseColorY: r, offsetL: offsetL };
                }
            }
        }

        // ブロック生成 (ピラミッド/階段状) + ステージ3用の消えないブロック
        function createBricksPyramid(cols, rows, offsetL) {
            bricks = [];

            // 消えないブロックを置く場所をあらかじめ決める (3箇所くらい)
            const indestructiblePositions = [
                { c: Math.floor(cols / 2), r: rows - 1 }, // ど真ん中の一番下
                { c: Math.floor(cols / 4), r: Math.floor(rows / 2) }, // 左の中腹
                { c: Math.floor(cols * 3 / 4), r: Math.floor(rows / 2) } // 右の中腹
            ];

            for (let c = 0; c < cols; c++) {
                bricks[c] = [];
                for (let r = 0; r < rows; r++) {
                    const distFromCenter = Math.abs(c - cols / 2);
                    let status = (rows - r > distFromCenter) ? 1 : 0;

                    // 特殊な消えないブロックかどうか判定
                    let isIndestructible = false;
                    for (let pos of indestructiblePositions) {
                        if (pos.c === c && pos.r === r) {
                            status = 2; // status 2 = 消えないブロック
                            isIndestructible = true;
                            break;
                        }
                    }

                    bricks[c][r] = {
                        x: 0, y: 0,
                        status: status,
                        baseColorY: r,
                        offsetL: offsetL,
                        isIndestructible: isIndestructible
                    };
                }
            }
        }

        // --- トランポリン（線）の管理 ---
        const trampolines = [];
        let drawingLine = null;
        let lineDrawCount = 0;

        let lastLineTime = 0; // 最後に線が消えた時刻
        const cooldownTime = 200; // クールダウン 0.2秒 (200ms)

        function getCoords(e) {
            if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }

        function startDraw(e) {
            // 初回タッチ時にAudioContextを初期化（ブラウザの自動再生ブロック対策）
            if (isSoundEnabled && !audioCtx) initAudio();

            e.preventDefault();

            // クールダウン処理：線が残っているか、消えてから0.2秒経っていないなら弾く
            if (trampolines.length > 0 || drawingLine !== null) return;
            const now = Date.now();
            if (now - lastLineTime < cooldownTime) return;

            const pos = getCoords(e);
            lineDrawCount++;
            drawingLine = {
                start: pos, current: pos,
                isTrick: (lineDrawCount % 10 === 0)
            };
        }

        function moveDraw(e) {
            e.preventDefault();
            if (drawingLine) {
                const pos = getCoords(e);
                const dx = pos.x - drawingLine.start.x;
                const dy = pos.y - drawingLine.start.y;
                const dist = Math.hypot(dx, dy);
                const maxLength = 100;

                if (dist > maxLength) {
                    const ratio = maxLength / dist;
                    drawingLine.current = { x: drawingLine.start.x + dx * ratio, y: drawingLine.start.y + dy * ratio };
                } else {
                    drawingLine.current = pos;
                }
            }
        }

        function endDraw(e) {
            e.preventDefault();
            if (drawingLine) {
                const dx = drawingLine.current.x - drawingLine.start.x;
                const dy = drawingLine.current.y - drawingLine.start.y;

                if (Math.hypot(dx, dy) > 10) {
                    // ここでは最大1本しか持たない
                    trampolines.push({ start: drawingLine.start, end: drawingLine.current, life: 100, isTrick: drawingLine.isTrick });
                } else {
                    // 短すぎて描画されなかった場合もクールダウンを発動させないため記録更新
                    lastLineTime = Date.now();
                }
                drawingLine = null;
            }
        }

        canvas.addEventListener("mousedown", startDraw);
        canvas.addEventListener("mousemove", moveDraw);
        canvas.addEventListener("mouseup", endDraw);
        canvas.addEventListener("touchstart", startDraw, { passive: false });
        canvas.addEventListener("touchmove", moveDraw, { passive: false });
        canvas.addEventListener("touchend", endDraw);


        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius * 2, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 51, 102, 0.2)";
            ctx.fill();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1 || b.status === 2) {
                        b.x = (c * (brickWidth + brickPadding)) + b.offsetL;
                        b.y = (r * (brickHeight + brickPadding)) + brickOffsetTop;

                        ctx.beginPath();
                        ctx.roundRect(b.x, b.y, brickWidth, brickHeight, 4);

                        if (b.status === 2) {
                            // 消えないブロックは灰色
                            ctx.fillStyle = "#888888";
                        } else {
                            // 通常のブロックはグラデーション色
                            ctx.fillStyle = `hsl(${b.baseColorY * 40 + 160}, 80%, 65%)`;
                        }

                        ctx.fill();
                    }
                }
            }
        }

        function drawTrampolines() {
            ctx.lineCap = "round";

            if (drawingLine) {
                ctx.beginPath();
                ctx.moveTo(drawingLine.start.x, drawingLine.start.y);
                ctx.lineTo(drawingLine.current.x, drawingLine.current.y);
                ctx.strokeStyle = drawingLine.isTrick ? "rgba(255, 215, 0, 0.8)" : "rgba(0, 255, 221, 0.5)";
                ctx.lineWidth = 6;
                ctx.stroke();
            }

            for (let i = 0; i < trampolines.length; i++) {
                const t = trampolines[i];
                ctx.beginPath();
                ctx.moveTo(t.start.x, t.start.y);
                ctx.lineTo(t.end.x, t.end.y);
                ctx.strokeStyle = t.isTrick ? `rgba(255, 215, 0, ${t.life / 100})` : `rgba(0, 255, 221, ${t.life / 100})`;
                ctx.lineWidth = 6;
                ctx.stroke();
            }
        }

        function getDistanceToSegment(p, a, b) {
            const l2 = (b.x - a.x) ** 2 + (b.y - a.y) ** 2;
            if (l2 == 0) return Math.hypot(p.x - a.x, p.y - a.y);
            let t = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            const proj = { x: a.x + t * (b.x - a.x), y: a.y + t * (b.y - a.y) };
            return { dist: Math.hypot(p.x - proj.x, p.y - proj.y), proj: proj };
        }

        function isStageClear() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) return false;
                }
            }
            return true;
        }

        function collisionDetection() {
            let blockHit = false; // Flag to track if any block was hit in this frame
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1 || b.status === 2) {
                        if (ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + brickWidth &&
                            ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + brickHeight) {

                            ball.dy = -ball.dy;

                            if (b.status === 2) {
                                // 消えないブロックの場合、硬い音が鳴るだけでスコアは入らず壊れない
                                playSE(200, 'square', 0.05, 0.05); // カンッという低い音
                            } else {
                                // 通常のブロックの場合
                                b.status = 0;
                                score += 10;
                                scoreText.innerText = score;
                                playSE(880, 'square', 0.1, 0.05); // ピコッ（ブロック破壊）

                                if (isStageClear()) {
                                    if (currentStage < maxStage) {
                                        playSE(523.25, 'triangle', 0.2, 0.1, 1046.5); // ステージクリア音
                                        // BGMの音程を少し上げる（難易度アップの演出）
                                        for (let i = 0; i < bgmNotes.length; i++) bgmNotes[i] *= 1.059463; // 半音上げ
                                        alert("STAGE " + currentStage + " CLEAR! 次のステージへ進みます");
                                        loadStage(currentStage + 1);
                                    } else {
                                        playSE(1046.5, 'triangle', 0.5, 0.1, 2093); // 全クリア音
                                        alert("CONGRATULATIONS! 全ステージクリア！おめでとう！");
                                        document.location.reload();
                                    }
                                }
                            }
                        }
                    }
                }
            }

            for (let i = trampolines.length - 1; i >= 0; i--) {
                const t = trampolines[i];
                const res = getDistanceToSegment(ball, t.start, t.end);

                if (res.dist < ball.radius) {
                    const dx = t.end.x - t.start.x;
                    const dy = t.end.y - t.start.y;
                    const len = Math.hypot(dx, dy);

                    if (len > 0) {
                        let nx = -dy / len;
                        let ny = dx / len;
                        let dotBall = ball.dx * nx + ball.dy * ny;

                        if (dotBall > 0) {
                            nx = -nx; ny = -ny; dotBall = -dotBall;
                        }

                        ball.dx = ball.dx - 2 * dotBall * nx;
                        ball.dy = ball.dy - 2 * dotBall * ny;

                        let speedMulti = 1.0;
                        if (t.isTrick) {
                            const curSpd = Math.hypot(ball.dx, ball.dy);
                            const trickBoost = 1.5 + Math.random() * 0.5;
                            speedMulti = (ball.baseSpeed * trickBoost) / (curSpd || 1);
                            canvas.style.backgroundColor = "rgba(255, 215, 0, 0.3)";
                            playSE(1200, 'sawtooth', 0.3, 0.05, 2400); // ギュイーン！(加速)
                            setTimeout(() => { canvas.style.backgroundColor = "#1a1a1a"; }, 100);
                        } else {
                            const curSpd = Math.hypot(ball.dx, ball.dy);
                            speedMulti = ball.baseSpeed / (curSpd || 1);
                            canvas.style.backgroundColor = "#2a2a2a";
                            playSE(440, 'sine', 0.1, 0.1); // ポヨン(通常反射)
                            setTimeout(() => { canvas.style.backgroundColor = "#1a1a1a"; }, 50);
                        }

                        ball.dx *= speedMulti;
                        ball.dy *= speedMulti;
                        ball.x += nx * (ball.radius - res.dist);
                        ball.y += ny * (ball.radius - res.dist);

                        // 当たった直後は少し待機（即座に連続で消えるのを防ぐ）
                        t.life = 0; // すぐに消すようマーク
                    }
                }
            }
        }

        // --- メインループ ---
        function update() {
            if (isGameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBricks();
            drawTrampolines();
            drawBall();

            collisionDetection();
            updateBGM(); // BGMループを進める

            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
                ball.dx = -ball.dx;
                playSE(150, 'square', 0.05, 0.05); // 壁反射の低い音
            }
            if (ball.y + ball.dy < ball.radius) {
                ball.dy = -ball.dy;
                playSE(150, 'square', 0.05, 0.05); // 天井反射
            }
            else if (ball.y + ball.dy > canvas.height - ball.radius) {
                lives--; // ライフを減らす
                updateLivesUI();
                playSE(100, 'sawtooth', 0.5, 0.1, 50); // ミス時の落ちる音

                if (lives > 0) {
                    // ミスしてもライフが残っている場合はボールを中央に戻して再スタート
                    ball.x = canvas.width / 2;
                    ball.y = canvas.height / 2;
                    ball.dx = (Math.random() > 0.5 ? 1 : -1) * 3;
                    ball.dy = -4;
                    // 線もすべて消す
                    trampolines.length = 0;
                    drawingLine = null;
                } else {
                    // ライフが0になったらゲームオーバー
                    isGameOver = true;
                    setTimeout(() => {
                        alert("GAME OVER... \n スコア: " + score);
                        document.location.reload();
                    }, 500); // すぐアラートが出ないように少しだけ遅延を500msに調整
                }
            }

            ball.x += ball.dx;
            ball.y += ball.dy;

            for (let i = trampolines.length - 1; i >= 0; i--) {
                trampolines[i].life -= 2;
                if (trampolines[i].life <= 0) {
                    trampolines.splice(i, 1);
                    // 完全に線が消えた時刻を記録
                    lastLineTime = Date.now();
                }
            }

            requestAnimationFrame(update);
        }

        // 初回ステージ読み込みと開始
        loadStage(1);
        update();
    </script>
</body>

</html>
